# Workflow name
name: Testing Secret Variables

# Trigger the workflow manually
on:
  workflow_dispatch:

# Workflow-level environment variable
env:
  ACTIONS_STEP_DEBUG: true

jobs:
  # Job to test secret variables
  test_context_variables:
    runs-on: ubuntu-latest

    steps:
      # Step to use the secret
      - name: "Checking Secret Variable"
        run: |
          # GitHub masks secrets in logs as ***
          echo "Secret Value: ${{ secrets.MY_KEY }}"

          # Store the secret in an environment variable
          SECRET_VALUE="${{ secrets.MY_KEY }}"

          # Use the secret without exposing it
          echo "Secret has been loaded successfully."
