# Workflow name
name: Test User Input Workflow

# Trigger the workflow manually
on:
  workflow_dispatch:
    # Define inputs that the user provides when running the workflow
    inputs:
      number1:
        description: "First number"
        required: true
        default: "0"
        type: string

      number2:
        description: "Second number"
        required: true
        default: "0"
        type: string

jobs:
  # Job to add two numbers
  add_numbers:
    runs-on: ubuntu-latest

    steps:
      # Step to calculate the sum
      - name: Add Numbers
        id: sum
        run: |
          echo "sum=$((${{ inputs.number1 }} + ${{ inputs.number2 }}))" >> "$GITHUB_OUTPUT"

      # Step to display the result
      - name: Display Sum
        run: |
          echo "The sum of ${{ inputs.number1 }} and ${{ inputs.number2 }} is ${{ steps.sum.outputs.sum }}"
